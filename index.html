<script>
// ===== ERLC API =====
const ERLC_API_KEY = "fdWKTlzxNscCtrAOfHKj-ltorbrRrkLufkrZtczFpOjPugSKwUagwpjzYSRYR";

// ===== SESSION CONTROL =====
let sessionActive = false;
const SESSION_CONTROLLER = "baconthehelper36";
let currentUserName = null;

// ===== USER DATABASE =====
const users = {
  "225": {
    name: "baconthehelper36",
    tasks: ["Head of Vision", "Head of Authority"]
  },
  "556": {
    name: "Old_Tshirt",
    tasks: ["Head of Expansion", "Head of Executive Oversight"]
  },
  "488": { name: "Dargon", tasks: ["Head of Staff","Head of Server Management"] },
  "119": { name: "Dutchy chan", tasks: ["Head of Leadership Appointments","Head of Executive Operationals"] },
  "143": { name: "Beep", tasks: ["Head of Leadership Coordination","Head of Strategic Initiatives"] },
  "144": { name: "Khizryy", tasks: ["Head of Bot Systems","Developer of CB","Head of Automation"] },
  "185": { name: "Dragon", tasks: ["Head of Security","Community Manager","Head of Departments"] },
  "196": { name: "Retro", tasks: ["Head of MR","Head of Moderation","Head of Partnerships"] },
  "127": { name: "4acty", tasks: ["Head of Staff","Session Manager","Head of Finance"] }
};

// ===== SERVER CONTENT =====
const serverRules = ["WORK IN PROGRESS!!"];
const serverInfo = ["WORK IN PROGRESS!!"];

// ===== LOGIN =====
function login() {
  const code = document.getElementById("codeInput").value.trim();

  if (!users[code]) {
    document.getElementById("errorText").classList.remove("hidden");
    return;
  }

  const user = users[code];
  currentUserName = user.name;

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("welcomeText").textContent =
    `Access Granted — Welcome ${user.name}`;

  document.getElementById("rulesBox").innerHTML =
    serverRules.map(r => `<p>• ${r}</p>`).join("");

  document.getElementById("tasksBox").innerHTML =
    user.tasks.map(t => `<p>• ${t}</p>`).join("");

  document.getElementById("infoBox").innerHTML =
    serverInfo.map(i => `<p>• ${i}</p>`).join("");

  // ⭐ SHOW ADMIN PANEL IF YOU
  if (currentUserName === SESSION_CONTROLLER) {
    document.getElementById("sessionControlPanel").classList.remove("hidden");
  }

  updateSessionUI();
}

// ===== TOGGLE SESSION =====
function toggleSession() {
  if (currentUserName !== SESSION_CONTROLLER) return;

  sessionActive = !sessionActive;
  updateSessionUI();

  document.getElementById("toggleSessionBtn").textContent =
    sessionActive ? "End Session" : "Start Session";
}

// ===== UPDATE STATUS =====
function updateSessionUI() {
  document.getElementById("sessionStatus").textContent =
    "Session: " + (sessionActive ? "Yes" : "No");
}

// ===== PLAYER COUNT =====
async function fetchPlayerCount() {
  try {
    const res = await fetch(
      "https://api.policeroleplay.community/v1/server",
      { headers: { "Server-Key": ERLC_API_KEY } }
    );

    const data = await res.json();

    document.getElementById("playerCount").textContent =
      "Players: " + (data.CurrentPlayers ?? "--");
  } catch {
    document.getElementById("playerCount").textContent =
      "Players: Error";
  }
}

// ===== AUTO REFRESH =====
fetchPlayerCount();
setInterval(fetchPlayerCount, 30000);
</script>
