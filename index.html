<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directive & Foundership Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-cyan-500 via-cyan-400 to-white text-gray-900 font-sans">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white/90 backdrop-blur p-10 rounded-2xl shadow-2xl w-96 text-center border border-cyan-200">
    
    <!-- LOGO -->
    <img src="https://i.imgur.com/GOk8CHv.png"
         alt="Server Logo"
         class="w-24 h-24 mx-auto mb-4 rounded-xl shadow-md">

    <h1 class="text-3xl font-bold mb-6 text-cyan-700">Secure Access</h1>

    <input id="codeInput" type="password" placeholder="Enter your code" 
      class="w-full p-3 rounded-lg bg-white border border-cyan-300 mb-4 outline-none focus:ring-2 focus:ring-cyan-400" />

    <button onclick="login()" 
      class="w-full bg-gradient-to-r from-cyan-500 to-cyan-400 hover:from-cyan-600 hover:to-cyan-500 text-white p-3 rounded-xl font-semibold shadow-lg">
      Login
    </button>

    <p id="errorText" class="text-red-500 mt-3 hidden">Unauthorized code.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <nav class="bg-gradient-to-r from-cyan-600 to-cyan-400 p-4 text-white shadow-lg flex items-center gap-3">
    
    <!-- NAV LOGO -->
    <img src="https://i.imgur.com/GOk8CHv.png"
         alt="Server Logo"
         class="w-10 h-10 rounded-lg shadow">

    <span class="text-xl font-bold">Directive & Foundership Dashboard</span>
  </nav>

  <section class="p-8">
    <h2 id="welcomeText" class="text-4xl font-bold mb-10 text-cyan-800">Welcome</h2>

    <!-- Rules -->
    <div class="mb-10">
      <h3 class="text-2xl font-semibold mb-3 text-cyan-700">Rules</h3>
      <div id="rulesBox" class="bg-white/90 backdrop-blur p-5 rounded-xl shadow-md border border-cyan-200 text-gray-700"></div>
    </div>

    <!-- Tasks -->
    <div class="mb-10">
      <h3 class="text-2xl font-semibold mb-3 text-cyan-700">Your Tasks</h3>
      <div id="tasksBox" class="bg-white/90 backdrop-blur p-5 rounded-xl shadow-md border border-cyan-200 text-gray-700"></div>
    </div>

    <!-- Info -->
    <div class="mb-10">
      <h3 class="text-2xl font-semibold mb-3 text-cyan-700">Server Info</h3>
      <div id="infoBox" class="bg-white/90 backdrop-blur p-5 rounded-xl shadow-md border border-cyan-200 text-gray-700"></div>
    </div>
  </section>
</div>

<script>
// ===== USER DATABASE (EDIT THIS) =====
const users = {
  "225": {
    name: "baconthehelper36",
    tasks: [
      "Head of Vision",
      "Head of Authority"
    ]
  },
  "556": {
    name: "Old_Tshirt",
    tasks: [
      "Head of Expansion",
      "Head of Executive Oversight"
    ]
  },

  // ===== NEW USERS =====
  "488": { name: "Dargon", tasks: ["Head of Staff","Head of Server Management"] },
  "119": { name: "Dutchy chan", tasks: ["Head of Leadership Appointments","Head of Executive Operationals"] },
  "143": { name: "Beep", tasks: ["Head of Leadership Coordination","Head of Strategic Initiatives"] },
  "144": { name: "Khizryy", tasks: ["Head of Bot Systems","Developer of CB","Head of Automation"] },
  "185": { name: "Dragon", tasks: ["Head of Security","Community Manager","Head of Departments"] },
  "196": { name: "Retro", tasks: ["Head of MR","Head of Moderation","Head of Partnerships"] },
  "127": { name: "4acty", tasks: ["Head of Staff","Session Manager","Head of Finance"] }
};

// ===== SERVER CONTENT (EDIT THIS) =====
const serverRules = [
  "WORK IN PROGRESS!!",
];

const serverInfo = [
  "WORK IN PROGRESS!!",
];

// ===== LOGIN FUNCTION =====
function login() {
  const code = document.getElementById("codeInput").value.trim();

  if (!users[code]) {
    document.getElementById("errorText").classList.remove("hidden");
    return;
  }

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  const user = users[code];

  document.getElementById("welcomeText").textContent = `Access Granted — Welcome ${user.name}`;
  document.getElementById("rulesBox").innerHTML = serverRules.map(r => `<p>• ${r}</p>`).join("");
  document.getElementById("tasksBox").innerHTML = user.tasks.map(t => `<p>• ${t}</p>`).join("");
  document.getElementById("infoBox").innerHTML = serverInfo.map(i => `<p>• ${i}</p>`).join("");
}
</script>

</body>
</html>
